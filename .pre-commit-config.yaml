repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: detect-private-key
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --new-from-rev=HEAD~1 --fix
        language: system
        pass_filenames: false
        types: [go]

      - id: go-test
        name: go test
        entry: go test -short -timeout=5m ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: nix-build-checks
        name: nix build checks (non-VM)
        entry: bash -c 'nix build --fallback .#checks.x86_64-linux.build .#checks.x86_64-linux.golangci-lint .#checks.x86_64-linux.formatting'
        language: system
        files: ^(flake\.(nix|lock)|go\.(mod|sum))$
        pass_filenames: false
